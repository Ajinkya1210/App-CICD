<!DOCTYPE html>
<html>
<head>
  <title>CloudCart</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      color: white;
      padding: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      width: 220px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .price {
      font-size: 18px;
      color: green;
      margin: 10px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<h1>🛒 CloudCart Store</h1>

<div class="container" id="products"></div>

<script>
async function loadProducts() {
    const res = await fetch('http://localhost:3000/products');
    const products = await res.json();

    const container = document.getElementById('products');
    container.innerHTML = '';

    products.forEach(p => {
        container.innerHTML += `
          <div class="card">
            <h3>${p.name}</h3>
            <div class="price">₹${p.price}</div>
            <button onclick="order('${p.name}')">Buy Now</button>
          </div>
        `;
    });
}

async function order(name) {
    await fetch('http://localhost:3000/products', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ product: name })
    });

    alert("✅ Order placed for " + name);
}

loadProducts();
</script>

</body>
</html>
